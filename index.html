<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber URL Sanitizer</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0d1117;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:900px;
background:#161b22;
padding:30px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,255,150,.2);
}

h1{
text-align:center;
margin-bottom:10px;
color:#00ff99;
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#9ca3af;
}

textarea{
width:100%;
height:120px;
padding:15px;
background:#0d1117;
border:1px solid #00ff99;
border-radius:8px;
color:white;
resize:none;
font-size:15px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.3s;
}

.scan{
background:#00ff99;
color:black;
}

.scan:hover{
transform:scale(1.05);
}

.copy{
background:#2563eb;
color:white;
margin-left:10px;
}

.output{
margin-top:25px;
padding:15px;
background:#0d1117;
border-radius:10px;
}

.output h3{
color:#00ff99;
margin-bottom:10px;
}

.result{
margin:8px 0;
word-break:break-word;
}

.low{
color:#22c55e;
font-weight:bold;
}

.medium{
color:#facc15;
font-weight:bold;
}

.high{
color:#ef4444;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:gray;
}
</style>
</head>

<body>

<div class="container">

<h1>Cyber URL Sanitizer</h1>

<p class="subtitle">
Analyze and sanitize URLs for common security risks.
</p>

<textarea
id="urlInput"
placeholder="Paste a URL here..."></textarea>

<br>

<button class="scan" onclick="scanURL()">
Analyze URL
</button>

<button class="copy" onclick="copyURL()">
Copy Sanitized URL
</button>

<div class="output">

<h3>Results</h3>

<div class="result">
<b>Risk Level:</b>
<span id="risk">-</span>
</div>

<div class="result">
<b>Detected Issues:</b>
<div id="issues">None</div>
</div>

<div class="result">
<b>Sanitized URL:</b>
<div id="clean">-</div>
</div>

</div>

<div class="footer">
© 2026 CyberShield URL Security Scanner • Detect • Analyze • Protect
</div>

</div>

<script>

let sanitizedURL="";

function scanURL(){

const input=document.getElementById("urlInput").value.trim();

const risk=document.getElementById("risk");

const issues=document.getElementById("issues");

const clean=document.getElementById("clean");

let findings=[];

let score=0;

sanitizedURL=input;

if(input===""){

risk.innerHTML="No URL";

issues.innerHTML="Enter a URL.";

clean.innerHTML="-";

return;

}

if(input.toLowerCase().startsWith("javascript:")){

findings.push("Dangerous javascript: protocol detected");

sanitizedURL="about:blank";

score+=5;

}

if(input.toLowerCase().startsWith("data:")){

findings.push("Dangerous data: protocol detected");

sanitizedURL="about:blank";

score+=5;

}

if(input.includes("<")){

findings.push("Contains < character");

sanitizedURL=sanitizedURL.replace(/</g,"");

score++;

}

if(input.includes(">")){

findings.push("Contains > character");

sanitizedURL=sanitizedURL.replace(/>/g,"");

score++;

}

if(input.includes('"')){

findings.push("Contains double quotes");

sanitizedURL=sanitizedURL.replace(/"/g,"");

score++;

}

if(input.includes("'")){

findings.push("Contains single quotes");

sanitizedURL=sanitizedURL.replace(/'/g,"");

score++;

}

if(input.includes(" ")){

findings.push("Contains spaces");

sanitizedURL=sanitizedURL.replace(/\s+/g,"");

score++;

}

if(input.length>200){

findings.push("Very long URL");

score++;

}

try{

let u=new URL(sanitizedURL);

if(u.protocol!=="http:" && u.protocol!=="https:"){

findings.push("Non HTTP/HTTPS protocol");

score+=2;

}

}catch{

findings.push("Invalid URL format");

score+=3;

}

clean.textContent=sanitizedURL;

if(findings.length===0){

issues.innerHTML="No security issues detected.";

risk.innerHTML="<span class='low'>LOW</span>";

return;

}

issues.innerHTML="<ul>"+findings.map(x=>"<li>"+x+"</li>").join("")+"</ul>";

if(score>=5){

risk.innerHTML="<span class='high'>HIGH</span>";

}else if(score>=2){

risk.innerHTML="<span class='medium'>MEDIUM</span>";

}else{

risk.innerHTML="<span class='low'>LOW</span>";

}

}

function copyURL(){

if(!sanitizedURL){

alert("Nothing to copy.");

return;

}

navigator.clipboard.writeText(sanitizedURL);

alert("Sanitized URL copied.");

}

</script>

</body>
</html>
