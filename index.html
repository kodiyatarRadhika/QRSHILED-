<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CyberShield Toolkit</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0d1117;
color:white;
padding:30px;

}

.container{

max-width:950px;
margin:auto;
background:#161b22;
padding:30px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,255,120,.15);

}

h1{

text-align:center;
color:#00ff99;

}

.subtitle{

text-align:center;
color:#9ca3af;
margin:10px 0 30px;

}

.tabs{

display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;

}

.tabs button{

padding:12px 25px;
border:none;
border-radius:8px;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

.activeTab{

background:#00ff99;
color:black;

}

.normalTab{

background:#222;
color:white;

}

.tabs button:hover{

transform:scale(1.05);

}

.section{

display:none;

}

.section.active{

display:block;

}

textarea,input{

width:100%;
padding:15px;
background:#0d1117;
color:white;
border:1px solid #00ff99;
border-radius:8px;
font-size:15px;
margin-bottom:15px;

}

button.scan{

background:#00ff99;
color:black;

}

button.copy{

background:#2563eb;
color:white;

}

button.clear{

background:#ef4444;
color:white;

}

.actionButtons button{

padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-right:10px;
font-weight:bold;
margin-bottom:20px;

}

.output{

background:#0d1117;
padding:15px;
border-radius:10px;
margin-top:15px;

}

.output h3{

color:#00ff99;
margin-bottom:10px;

}

.footer{

text-align:center;
margin-top:30px;
color:#9ca3af;

}

.low{

color:#22c55e;

}

.medium{

color:#facc15;

}

.high{

color:#ef4444;

}

</style>

</head>

<body>

<div class="container">

<h1>CyberShield Toolkit</h1>

<p class="subtitle">
Professional Cyber Security Toolkit
</p>

<div class="tabs">

<button id="urlTab"
class="activeTab"
onclick="showURL()">

🛡 URL Scanner

</button>

<button id="emailTab"
class="normalTab"
onclick="showEmail()">

📧 Email Checker

</button>

</div>

<!-- URL SECTION -->

<div id="urlSection"
class="section active">

<textarea
id="urlInput"
placeholder="Paste URL here..."></textarea>

<div class="actionButtons">

<button
class="scan"
onclick="scanURL()">

Analyze

</button>

<button
class="copy"
onclick="copyURL()">

Copy

</button>

</div>

<div class="output">

<h3>Result</h3>

<p>

<b>Risk:</b>

<span id="risk">-</span>

</p>

<p>

<b>Issues:</b>

</p>

<div id="issues">

None

</div>

<p>

<b>Sanitized URL:</b>

</p>

<div id="clean">

-

</div>

</div>

</div>

<!-- EMAIL SECTION -->

<div id="emailSection"
class="section">

<input

type="text"

id="emailInput"

placeholder="Enter Email Address">

<div class="actionButtons">

<button
class="scan"
onclick="checkEmail()">

Check Email

</button>

<button
class="clear"
onclick="clearEmail()">

Clear

</button>

</div>

<div class="output">

<h3>Email Result</h3>

<div id="emailInfo">

Waiting...

</div>

<br>

<div id="emailResult">

Waiting...

</div>

</div>

</div>

<div class="footer">

© 2026 CyberShield Toolkit • Detect • Analyze • Protect

  </div>
  <script>

// ---------- TAB SWITCHING ----------

function showURL(){

document.getElementById("urlSection").classList.add("active");
document.getElementById("emailSection").classList.remove("active");

document.getElementById("urlTab").className="activeTab";
document.getElementById("emailTab").className="normalTab";

}

function showEmail(){

document.getElementById("emailSection").classList.add("active");
document.getElementById("urlSection").classList.remove("active");

document.getElementById("emailTab").className="activeTab";
document.getElementById("urlTab").className="normalTab";

}

// ---------- URL SCANNER ----------

let sanitizedURL="";

function scanURL(){

const input=document.getElementById("urlInput").value.trim();

const risk=document.getElementById("risk");

const issues=document.getElementById("issues");

const clean=document.getElementById("clean");

let findings=[];

let score=0;

sanitizedURL=input;

if(input===""){

risk.innerHTML="-";
issues.innerHTML="Please enter a URL.";
clean.innerHTML="-";
return;

}

if(input.toLowerCase().startsWith("javascript:")){

findings.push("❌ javascript: protocol detected");
sanitizedURL="about:blank";
score+=5;

}

if(input.toLowerCase().startsWith("data:")){

findings.push("❌ data: protocol detected");
sanitizedURL="about:blank";
score+=5;

}

if(input.includes("<")){

findings.push("⚠ Contains < character");
sanitizedURL=sanitizedURL.replace(/</g,"");
score++;

}

if(input.includes(">")){

findings.push("⚠ Contains > character");
sanitizedURL=sanitizedURL.replace(/>/g,"");
score++;

}

if(input.includes('"')){

findings.push("⚠ Contains double quotes");
sanitizedURL=sanitizedURL.replace(/"/g,"");
score++;

}

if(input.includes("'")){

findings.push("⚠ Contains single quotes");
sanitizedURL=sanitizedURL.replace(/'/g,"");
score++;

}

if(input.includes(" ")){

findings.push("⚠ Contains spaces");
sanitizedURL=sanitizedURL.replace(/\s+/g,"");
score++;

}

try{

let url=new URL(sanitizedURL);

if(url.protocol==="https:"){

findings.push("✅ HTTPS Secure");

}else{

findings.push("⚠ HTTP Connection");
score++;

}

}catch{

findings.push("❌ Invalid URL");
score+=3;

}

clean.innerHTML=sanitizedURL;

if(findings.length==0){

issues.innerHTML="No threats detected.";
risk.innerHTML="<span class='low'>LOW</span>";

}else{

issues.innerHTML="<ul><li>"+findings.join("</li><li>")+"</li></ul>";

if(score>=5){

risk.innerHTML="<span class='high'>HIGH</span>";

}else if(score>=2){

risk.innerHTML="<span class='medium'>MEDIUM</span>";

}else{

risk.innerHTML="<span class='low'>LOW</span>";

}

}

}

function copyURL(){

if(sanitizedURL===""){

alert("Nothing to copy.");

return;

}

navigator.clipboard.writeText(sanitizedURL);

alert("Copied successfully.");

}
    // ---------- EMAIL SECURITY CHECKER ----------

function checkEmail(){

const email=document.getElementById("emailInput").value.trim();

const info=document.getElementById("emailInfo");

const result=document.getElementById("emailResult");

const regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(email===""){

info.innerHTML="❌ Please enter an email address.";
result.innerHTML="";
return;

}

if(!regex.test(email)){

info.innerHTML="❌ Invalid Email Format";
result.innerHTML="<span class='high'>HIGH RISK</span>";
return;

}

const username=email.split("@")[0];

const domain=email.split("@")[1];

const disposable=[
"mailinator.com",
"10minutemail.com",
"guerrillamail.com",
"tempmail.com",
"yopmail.com"
];

const trusted=[
"gmail.com",
"outlook.com",
"hotmail.com",
"yahoo.com",
"icloud.com",
"proton.me",
"protonmail.com"
];

let score=100;
let messages=[];

if(disposable.includes(domain)){
messages.push("⚠ Disposable Email Provider");
score-=50;
}

if(username.length<3){
messages.push("⚠ Username is very short");
score-=10;
}

if(/[0-9]{5,}/.test(username)){
messages.push("⚠ Too many numbers");
score-=10;
}

if(username.toLowerCase().includes("admin")){
messages.push("⚠ Contains 'admin'");
score-=10;
}

if(username.toLowerCase().includes("verify")){
messages.push("⚠ Contains 'verify'");
score-=10;
}

if(username.toLowerCase().includes("support")){
messages.push("⚠ Contains 'support'");
score-=10;
}

if(trusted.includes(domain)){
messages.push("✅ Trusted Email Provider");
}

let level="🟢 SAFE";
let css="low";

if(score<80){
level="🟡 MEDIUM";
css="medium";
}

if(score<50){
level="🔴 HIGH";
css="high";
}

info.innerHTML=
"<b>Username:</b> "+username+
"<br><b>Domain:</b> "+domain+
"<br><b>Security Score:</b> "+score+"/100";

result.innerHTML=
messages.join("<br>")+
"<br><br><span class='"+css+"'><b>"+level+"</b></span>";

}

function clearEmail(){

document.getElementById("emailInput").value="";

document.getElementById("emailInfo").innerHTML="Waiting...";

document.getElementById("emailResult").innerHTML="Waiting...";

}

// Show URL tab by default

showURL();

</script>

</body>
</html>
